services:
  copaw:
    # Upstream CoPaw publishes only :latest and :pre on Docker Hub (no per-version
    # tags for v1.1.x+). Pinning to ${VERSION} produced unusable fpks (issue #140).
    # Float to :latest per upstream's official runtime recommendation.
    image: ${DOCKER_MIRROR}docker.io/agentscope/copaw:latest
    container_name: copaw
    ports:
      - "${TRIM_SERVICE_PORT}:8088"
    volumes:
      - ${TRIM_PKGVAR:?}/data:/app/working
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
